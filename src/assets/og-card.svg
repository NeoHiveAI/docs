<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16111F" />
      <stop offset="1" stop-color="#0B0912" />
    </linearGradient>
    <radialGradient id="glow" cx="0.16" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.30" />
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- Logo mark: three nested hexagons (scaled 3.4x from the 59x58 source) -->
  <g transform="translate(86,86) scale(3.4)">
    <polygon points="20,0 38,10 38,28 20,38 2,28 2,10" fill="none" stroke="#7C3AED" stroke-width="2.5" stroke-linejoin="round" />
    <polygon points="39,10 57,20 57,38 39,48 21,38 21,20" fill="none" stroke="#A78BFA" stroke-width="2" stroke-linejoin="round" />
    <polygon points="20,20 38,30 38,48 20,58 2,48 2,30" fill="none" stroke="#C084FC" stroke-width="2" stroke-linejoin="round" />
  </g>

  <!-- Wordmark -->
  <text x="90" y="410" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="98" font-weight="700" letter-spacing="-3" fill="#FFFFFF">NeoHive</text>

  <!-- Tagline -->
  <text x="94" y="474" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="37" font-weight="500" fill="#C4B8E8">The context layer for your coding agents</text>

  <!-- Domain -->
  <text x="94" y="566" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="27" font-weight="500" letter-spacing="0.5" fill="#8B7BB8">docs.neohive.ai</text>
</svg>
